name: Package Linux DevTools

on:
    workflow_dispatch:

concurrency:
    group: ${{ github.ref }}-package-linux-devtools
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    package:
        name: Linux DevTools AppImage
        runs-on: ubuntu-24.04
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v6

            - uses: dtolnay/rust-toolchain@stable

            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: npm

            - name: Install Linux dependencies
              run: |
                  webkitgtk_version="2.44.0-2"

                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      build-essential \
                      curl \
                      file \
                      libayatana-appindicator3-dev \
                      libssl-dev \
                      libxdo-dev \
                      librsvg2-dev \
                      patchelf \
                      rpm \
                      wget
                  sudo apt-get install -y --no-install-recommends \
                      libgtk-3-dev \
                      libwebkit2gtk-4.1-0="$webkitgtk_version" \
                      libwebkit2gtk-4.1-dev="$webkitgtk_version" \
                      libjavascriptcoregtk-4.1-0="$webkitgtk_version" \
                      libjavascriptcoregtk-4.1-dev="$webkitgtk_version" \
                      gir1.2-javascriptcoregtk-4.1="$webkitgtk_version" \
                      gir1.2-webkit2-4.1="$webkitgtk_version"

            - run: npm ci

            - id: devtools
              name: Prepare AppImage DevTools config
              run: |
                  node <<'NODE'
                  const fs = require('node:fs');

                  const tauriConfigPath = 'src-tauri/tauri.conf.json';
                  const linuxConfigPath = 'src-tauri/tauri.linux.conf.json';
                  const outputConfigPath = 'src-tauri/tauri.linux-devtools.conf.json';

                  const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, 'utf8'));
                  const linuxConfig = JSON.parse(fs.readFileSync(linuxConfigPath, 'utf8'));
                  const config = {
                      bundle: {
                          ...(linuxConfig.bundle ?? {}),
                          targets: ['appimage'],
                          createUpdaterArtifacts: false
                      }
                  };

                  fs.writeFileSync(outputConfigPath, `${JSON.stringify(config, null, 4)}\n`);
                  fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${tauriConfig.version}\n`);
                  NODE

            - name: Build Linux DevTools AppImage
              env:
                  VRCX-0_BUILD_LABEL: test
              run: |
                  npm run tauri:build:devtools -- \
                      --config src-tauri/tauri.linux-devtools.conf.json \
                      --bundles appimage

            - name: List AppImage output
              run: find target/release/bundle/appimage -maxdepth 1 -type f | sort

            - uses: actions/upload-artifact@v7
              with:
                  name: linux-appimage-devtools-${{ steps.devtools.outputs.version }}
                  path: target/release/bundle/appimage/*.AppImage
                  if-no-files-found: error
