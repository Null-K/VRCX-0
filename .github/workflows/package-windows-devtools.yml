name: Package Windows DevTools

on:
    workflow_dispatch:

concurrency:
    group: ${{ github.ref }}-package-windows-devtools
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    package:
        name: Windows DevTools Package
        runs-on: windows-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v6

            - uses: dtolnay/rust-toolchain@stable

            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: npm

            - run: npm ci

            - id: devtools
              name: Prepare unsigned non-updater config
              run: |
                  node <<'NODE'
                  const fs = require('node:fs');

                  const tauriConfigPath = 'src-tauri/tauri.conf.json';
                  const outputConfigPath = 'src-tauri/tauri.windows-devtools.conf.json';

                  const config = JSON.parse(fs.readFileSync(tauriConfigPath, 'utf8'));
                  config.bundle ??= {};
                  config.bundle.createUpdaterArtifacts = false;

                  config.bundle.windows ??= {};
                  delete config.bundle.windows.certificateThumbprint;
                  delete config.bundle.windows.signCommand;

                  fs.writeFileSync(outputConfigPath, `${JSON.stringify(config, null, 4)}\n`);
                  fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${config.version}\n`);
                  NODE

            - name: Build unsigned Windows DevTools package
              env:
                  VRCX-0_BUILD_LABEL: test
              run: |
                  npm run tauri:build:devtools -- \
                      --debug \
                      --config src-tauri/tauri.windows-devtools.conf.json \
                      --no-sign \
                      --no-bundle

            - uses: actions/upload-artifact@v7
              with:
                  name: windows-devtools-${{ steps.devtools.outputs.version }}
                  path: target/debug/vrcx-0.exe
                  if-no-files-found: error
